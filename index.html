<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Ranking Keterlambatan</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Rubik", sans-serif;
      }

      :root {
        --bg: #fbfaff;
        --card: #ffffff;
        --text: #141a39;
        --muted: #5a5f7a;
        --primary: #5c5be5;
        --primary-soft: #efefff;
        --border: #d7daf6;
        --danger: #f55e77;
        --danger-dark: #c0506a;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
      }

      main {
        width: min(860px, 100%);
        background: var(--card);
        box-shadow: 0px 5px 15px 8px #e4e7fb;
        border-radius: 14px;
        overflow: hidden;
      }

      #header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px 18px 10px 18px;
      }

      .titleWrap h1 {
        font-size: 18px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--text);
      }

      .titleWrap p {
        margin-top: 6px;
        font-size: 13px;
        color: #4a4f6a;
        line-height: 1.35;
      }

      .share {
        flex: 0 0 auto;
        width: 44px;
        height: 36px;
        background: var(--danger);
        border: 0;
        border-bottom: 3px solid var(--danger-dark);
        border-radius: 999px;
        cursor: pointer;
        display: grid;
        place-items: center;
      }

      .share:active {
        border-bottom: 0;
        transform: translateY(2px);
      }

      .share i {
        color: #fff;
        font-size: 20px;
      }

      .controls {
        padding: 0 18px 10px 18px;
        display: grid;
        gap: 10px;
      }

      .controlRow {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .filterBtn,
      .monthControl {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        padding: 10px 12px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .filterBtn i {
        font-size: 18px;
      }

      .filterBtn.active {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }

      .monthControl {
        padding-right: 8px;
        cursor: default;
      }

      .monthControl label {
        font-weight: 600;
        color: var(--muted);
      }

      .monthControl select {
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font-size: 13px;
        min-width: 145px;
        cursor: pointer;
      }

      .monthControl.hidden {
        display: none;
      }

      .summary {
        padding: 0 18px 14px 18px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .summaryCard {
        border: 1px solid var(--border);
        background: var(--primary-soft);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        min-width: 145px;
      }

      .summaryCard small {
        display: block;
        color: var(--muted);
        margin-bottom: 4px;
        font-size: 12px;
      }

      .summaryCard strong {
        font-size: 16px;
      }

      .hint {
        padding: 0 18px 14px 18px;
        font-size: 12.5px;
        color: var(--muted);
      }

      #leaderboard {
        padding: 0 0 12px 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        color: var(--text);
      }

      tbody tr {
        transition: background 0.15s ease;
      }

      tbody tr:not(.tableHead):nth-child(even) {
        background: #f9f9f9;
      }

      tbody tr:not(.tableHead):hover {
        background: #ffffff;
      }

      td {
        padding: 14px 18px;
        font-size: 14px;
        vertical-align: middle;
      }

      .tableHead {
        background: var(--primary);
      }

      .tableHead td {
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      .tableHead td:first-child {
        border-top-left-radius: 14px;
      }

      .tableHead td:last-child {
        border-top-right-radius: 14px;
      }

      .number {
        width: 76px;
        font-size: 18px;
        font-weight: 700;
        text-align: left;
        color: var(--text);
      }

      .name {
        text-align: left;
        font-weight: 600;
        word-break: break-word;
      }

      .points {
        text-align: right;
        font-weight: 700;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
      }

      .medal {
        width: 28px;
        height: 28px;
        display: inline-grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(92, 91, 229, 0.12);
        border: 1px solid rgba(92, 91, 229, 0.18);
        font-size: 16px;
      }

      .statusWrap {
        padding: 14px 18px 10px 18px;
        color: #4a4f6a;
        font-size: 13px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        padding: 8px 12px;
        border-radius: 999px;
      }

      .pill i {
        font-size: 18px;
      }

      @media (max-width: 640px) {
        td {
          padding: 12px 12px;
          font-size: 13px;
        }

        .number {
          width: 60px;
          font-size: 16px;
        }

        #header {
          padding: 16px 14px 10px 14px;
        }

        .controls,
        .summary,
        .hint,
        .statusWrap {
          padding-left: 14px;
          padding-right: 14px;
        }

        .summaryCard {
          min-width: calc(50% - 4px);
        }
      }

      @media (max-width: 480px) {
        .summaryCard {
          min-width: 100%;
        }

        .monthControl {
          width: 100%;
          justify-content: space-between;
        }

        .monthControl select {
          min-width: 110px;
          max-width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <div id="header">
        <div class="titleWrap">
          <h1 id="pageTitle">RANKING</h1>
          <p id="subtitle">Ranking Paling Terlambat</p>
        </div>

        <button class="share" id="btnShare" aria-label="Share">
          <i class="ph ph-share-network"></i>
        </button>
      </div>

      <div class="controls">
        <div class="controlRow" id="viewControls">
          <button class="filterBtn active" id="btnViewRanking" type="button">
            <i class="ph ph-trophy"></i>
            Ranking
          </button>
          <button class="filterBtn" id="btnViewRecap" type="button">
            <i class="ph ph-chart-bar"></i>
            Recap
          </button>
        </div>

        <div class="controlRow" id="sortControls">
          <button class="filterBtn active" id="btnTerlambat" type="button">
            <i class="ph ph-sort-descending"></i>
            Ranking Paling Terlambat
          </button>
          <button class="filterBtn" id="btnRajin" type="button">
            <i class="ph ph-sort-ascending"></i>
            Ranking Paling Rajin
          </button>
          <div class="monthControl hidden" id="monthControl">
            <label for="monthSelect">Filter Bulan</label>
            <select id="monthSelect"></select>
          </div>
        </div>
      </div>

      <div class="summary" id="summary"></div>

      <div class="hint" id="hintText">
        <strong>Catatan:</strong> Data ranking berubah maksimal 3 menit setelah perubahan data admin.
      </div>

      <div id="leaderboard">
        <table aria-label="Leaderboard">
          <tbody id="tbody"></tbody>
        </table>
        <div class="statusWrap" id="status"></div>
      </div>
    </main>

    <script>
      const RANKING_SHEET_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2MhRX_p6g3KFPP2W4XJn6g98RbhDdjIPFztK71HafHiZ9WGCLoGZ7pm_X2lPTA-yIizfIxgA2mEVA/pubhtml";

      const RECAP_SHEET_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2MhRX_p6g3KFPP2W4XJn6g98RbhDdjIPFztK71HafHiZ9WGCLoGZ7pm_X2lPTA-yIizfIxgA2mEVA/pubhtml?gid=949865330&single=true";

      const MONTH_DICTIONARY = [
        { aliases: ["januari", "jan"], key: "januari", label: "Januari" },
        { aliases: ["februari", "feb"], key: "februari", label: "Februari" },
        { aliases: ["maret", "mar"], key: "maret", label: "Maret" },
        { aliases: ["april", "apr"], key: "april", label: "April" },
        { aliases: ["mei", "may"], key: "mei", label: "Mei" },
        { aliases: ["juni", "jun"], key: "juni", label: "Juni" },
        { aliases: ["juli", "jul"], key: "juli", label: "Juli" },
        { aliases: ["agustus", "agu", "agt", "aug"], key: "agustus", label: "Agustus" },
        { aliases: ["september", "sep", "sept"], key: "september", label: "September" },
        { aliases: ["oktober", "okt", "oct"], key: "oktober", label: "Oktober" },
        { aliases: ["november", "nov"], key: "november", label: "November" },
        { aliases: ["desember", "des", "dec"], key: "desember", label: "Desember" },
      ];

      const state = {
        view: "ranking",
        mode: "terlambat",
        selectedMonth: "total",
        rankingRows: [],
        recapRows: [],
        recapMonths: [],
        loadedAt: null,
      };

      const tbody = document.getElementById("tbody");
      const statusEl = document.getElementById("status");
      const subtitle = document.getElementById("subtitle");
      const summaryEl = document.getElementById("summary");
      const hintText = document.getElementById("hintText");
      const monthSelect = document.getElementById("monthSelect");
      const monthControl = document.getElementById("monthControl");
      const pageTitle = document.getElementById("pageTitle");

      const btnViewRanking = document.getElementById("btnViewRanking");
      const btnViewRecap = document.getElementById("btnViewRecap");
      const btnTerlambat = document.getElementById("btnTerlambat");
      const btnRajin = document.getElementById("btnRajin");
      const btnShare = document.getElementById("btnShare");

      function pubhtmlToCsv(url) {
        const parsed = new URL(url);
        parsed.pathname = parsed.pathname.replace(/\/pubhtml$/, "/pub");
        parsed.searchParams.set("output", "csv");
        parsed.searchParams.delete("single");
        return parsed.toString();
      }

      function parseCSV(text) {
        const rows = [];
        let row = [];
        let cur = "";
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          const next = text[i + 1];

          if (ch === '"' && inQuotes && next === '"') {
            cur += '"';
            i++;
            continue;
          }

          if (ch === '"') {
            inQuotes = !inQuotes;
            continue;
          }

          if (!inQuotes && ch === ",") {
            row.push(cur);
            cur = "";
            continue;
          }

          if (!inQuotes && ch === "\n") {
            row.push(cur);
            rows.push(row);
            row = [];
            cur = "";
            continue;
          }

          if (ch !== "\r") cur += ch;
        }

        if (cur.length > 0 || row.length > 0) {
          row.push(cur);
          rows.push(row);
        }

        return rows;
      }

      function normalize(value) {
        return (value ?? "")
          .toString()
          .trim()
          .toLowerCase()
          .replace(/\s+/g, " ");
      }

      function parseNumber(value) {
        const cleaned = String(value ?? "")
          .replace(/\./g, "")
          .replace(/,/g, ".")
          .replace(/[^\d.-]/g, "")
          .trim();

        const number = Number(cleaned);
        return Number.isFinite(number) ? number : 0;
      }

      function medalForRank(rank) {
        if (rank === 1) return "🥇";
        if (rank === 2) return "🥈";
        if (rank === 3) return "🥉";
        return null;
      }

      function formatNumber(value) {
        return new Intl.NumberFormat("id-ID").format(Number(value || 0));
      }

      function getMonthMeta(rawHeader) {
        const normalized = normalize(rawHeader);
        return MONTH_DICTIONARY.find((month) =>
          month.aliases.some((alias) => normalized === alias)
        );
      }

      function findColumns(rows, required = ["nama"]) {
        for (let i = 0; i < Math.min(rows.length, 40); i++) {
          const current = rows[i].map(normalize);
          const columns = {};

          required.forEach((key) => {
            columns[key] = current.findIndex((value) => value === key);
          });

          const allFound = Object.values(columns).every((idx) => idx !== -1);
          if (allFound) {
            return { headerIndex: i, header: rows[i], columns };
          }
        }

        return null;
      }

      function getCurrentDataset() {
        return state.view === "recap" ? state.recapRows : state.rankingRows;
      }

      function getActiveMetricLabel() {
        if (state.view === "ranking") return "Total";
        if (state.selectedMonth === "total") return "1 Tahun";

        const found = state.recapMonths.find((item) => item.key === state.selectedMonth);
        return found ? found.label : "Jumlah";
      }

      function getValueForRow(row) {
        if (state.view === "recap") {
          if (state.selectedMonth === "total") return row.total || 0;
          return row.months?.[state.selectedMonth] || 0;
        }
        return row.total || 0;
      }

      function updateTopText() {
        const isRecap = state.view === "recap";
        const monthLabel = getActiveMetricLabel();

        pageTitle.textContent = isRecap ? "RECAP" : "RANKING";

        if (isRecap) {
          subtitle.textContent =
            state.mode === "terlambat"
              ? `Recap Terbanyak - ${monthLabel}`
              : `Recap Terkecil - ${monthLabel}`;

          hintText.innerHTML =
            "<strong>Catatan:</strong> Tombol Recap mengambil data dari sheet recap dan tetap bisa difilter berdasarkan bulan atau 1 tahun.";
        } else {
          subtitle.textContent =
            state.mode === "terlambat"
              ? "Ranking Paling Terlambat"
              : "Ranking Paling Rajin";

          hintText.innerHTML =
            "<strong>Catatan:</strong> Data ranking berubah maksimal 3 menit setelah perubahan data admin.";
        }
      }

      function updateControls() {
        btnViewRanking.classList.toggle("active", state.view === "ranking");
        btnViewRecap.classList.toggle("active", state.view === "recap");
        btnTerlambat.classList.toggle("active", state.mode === "terlambat");
        btnRajin.classList.toggle("active", state.mode === "rajin");
        monthControl.classList.toggle("hidden", state.view !== "recap");
        monthSelect.value = state.selectedMonth;
        updateTopText();
      }

      function renderSummary(rows) {
        const activeLabel = getActiveMetricLabel();
        const totalUsers = rows.length;
        const visibleNonZero = rows.filter((row) => getValueForRow(row) > 0).length;
        const totalValue = rows.reduce((sum, row) => sum + getValueForRow(row), 0);

        summaryEl.innerHTML = `
          <div class="summaryCard">
            <small>Tampilan</small>
            <strong>${state.view === "recap" ? "Recap" : "Ranking"}</strong>
          </div>
          <div class="summaryCard">
            <small>Filter</small>
            <strong>${activeLabel}</strong>
          </div>
          <div class="summaryCard">
            <small>Total User</small>
            <strong>${formatNumber(totalUsers)}</strong>
          </div>
          <div class="summaryCard">
            <small>Total Nilai</small>
            <strong>${formatNumber(totalValue)}</strong>
          </div>
          <div class="summaryCard">
            <small>User dengan data</small>
            <strong>${formatNumber(visibleNonZero)}</strong>
          </div>
        `;
      }

      function renderStatus(rows) {
        const sourceLabel = state.view === "recap" ? "sheet recap" : "sheet ranking";
        const activeLabel = getActiveMetricLabel();
        const time = state.loadedAt
          ? new Date(state.loadedAt).toLocaleTimeString("id-ID", {
              hour: "2-digit",
              minute: "2-digit",
            })
          : "-";

        statusEl.innerHTML = `
          <span class="pill">
            <i class="ph ph-database"></i>
            Sumber: ${sourceLabel} | Filter: ${activeLabel} | Data user: ${rows.length} | Update tampilan: ${time}
          </span>
        `;
      }

      function renderEmpty(message) {
        tbody.innerHTML = `
          <tr class="tableHead">
            <td>Rank</td>
            <td>Nama</td>
            <td>${getActiveMetricLabel()}</td>
          </tr>
          <tr>
            <td colspan="3">${message}</td>
          </tr>
        `;
      }

      function renderTable(rows) {
        tbody.innerHTML = "";

        const header = document.createElement("tr");
        header.className = "tableHead";
        header.innerHTML = `
          <td>Rank</td>
          <td>Nama</td>
          <td>${getActiveMetricLabel()}</td>
        `;
        tbody.appendChild(header);

        rows.forEach((row, index) => {
          const rank = index + 1;
          const value = getValueForRow(row);
          const medal = medalForRank(rank);

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="number">${rank}</td>
            <td class="name">${row.name}</td>
            <td class="points">
              <span>${formatNumber(value)}</span>
              ${medal ? `<span class="medal" title="Top ${rank}">${medal}</span>` : ""}
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      function render() {
        updateControls();

        const rows = [...getCurrentDataset()].sort((a, b) => {
          const valueA = getValueForRow(a);
          const valueB = getValueForRow(b);
          if (state.mode === "terlambat") {
            if (valueB !== valueA) return valueB - valueA;
          } else {
            if (valueA !== valueB) return valueA - valueB;
          }
          return a.name.localeCompare(b.name, "id");
        });

        renderSummary(rows);
        renderStatus(rows);

        if (!rows.length) {
          renderEmpty("Belum ada data yang bisa ditampilkan.");
          return;
        }

        renderTable(rows);
      }

      function populateMonthOptions(months) {
        const options = [{ key: "total", label: "1 Tahun" }, ...months];
        monthSelect.innerHTML = options
          .map((item) => `<option value="${item.key}">${item.label}</option>`)
          .join("");
      }

      async function loadRankingData() {
        const csvUrl = pubhtmlToCsv(RANKING_SHEET_URL);
        const res = await fetch(csvUrl, { cache: "no-store" });
        if (!res.ok) throw new Error("Gagal fetch ranking CSV: " + res.status);

        const text = await res.text();
        const rows = parseCSV(text);
        if (!rows.length) throw new Error("CSV ranking kosong");

        const found = findColumns(rows, ["nama", "total"]);
        if (!found) {
          throw new Error("Header ranking tidak ditemukan. Pastikan ada kolom NAMA dan TOTAL.");
        }

        const { headerIndex, columns } = found;
        const dataRows = rows.slice(headerIndex + 1);
        const map = new Map();

        for (const row of dataRows) {
          const name = (row[columns.nama] ?? "").trim();
          if (!name) continue;

          const total = parseNumber(row[columns.total]);
          const key = name.toLowerCase();
          const current = map.get(key);

          if (!current || total > current.total) {
            map.set(key, { name, total });
          }
        }

        return Array.from(map.values());
      }

      async function loadRecapData() {
        const csvUrl = pubhtmlToCsv(RECAP_SHEET_URL);
        const res = await fetch(csvUrl, { cache: "no-store" });
        if (!res.ok) throw new Error("Gagal fetch recap CSV: " + res.status);

        const text = await res.text();
        const rows = parseCSV(text);
        if (!rows.length) throw new Error("CSV recap kosong");

        const found = findColumns(rows, ["nama"]);
        if (!found) {
          throw new Error("Header recap tidak ditemukan. Pastikan ada kolom NAMA.");
        }

        const { headerIndex, header, columns } = found;
        const totalCol = header.findIndex((cell) => normalize(cell) === "total");
        const monthColumns = [];

        header.forEach((cell, index) => {
          const monthMeta = getMonthMeta(cell);
          if (monthMeta) {
            monthColumns.push({
              key: monthMeta.key,
              label: monthMeta.label,
              index,
            });
          }
        });

        if (!monthColumns.length) {
          throw new Error("Kolom bulan di sheet recap tidak ditemukan.");
        }

        const dataRows = rows.slice(headerIndex + 1);
        const map = new Map();

        for (const row of dataRows) {
          const name = (row[columns.nama] ?? "").trim();
          if (!name) continue;

          const months = {};
          let calculatedTotal = 0;

          monthColumns.forEach((month) => {
            const value = parseNumber(row[month.index]);
            months[month.key] = value;
            calculatedTotal += value;
          });

          const total = totalCol !== -1 ? parseNumber(row[totalCol]) || calculatedTotal : calculatedTotal;
          map.set(name.toLowerCase(), { name, total, months });
        }

        return {
          rows: Array.from(map.values()),
          months: monthColumns,
        };
      }

      async function loadData() {
        try {
          statusEl.innerHTML = `<span class="pill"><i class="ph ph-circle-notch"></i> Memuat data...</span>`;

          const [rankingResult, recapResult] = await Promise.all([loadRankingData(), loadRecapData()]);

          state.rankingRows = rankingResult;
          state.recapRows = recapResult.rows;
          state.recapMonths = recapResult.months;
          state.loadedAt = Date.now();

          populateMonthOptions(state.recapMonths);
          render();
        } catch (error) {
          console.error(error);
          summaryEl.innerHTML = "";
          renderEmpty("Gagal memuat data. Cek publish-to-web pada sheet ranking dan recap.");
          statusEl.innerHTML = `
            <span class="pill">
              <i class="ph ph-warning-circle"></i>
              Gagal memuat data. Pastikan link publish-to-web aktif dan bisa diakses publik.
            </span>
          `;
        }
      }

      btnViewRanking.addEventListener("click", () => {
        state.view = "ranking";
        render();
      });

      btnViewRecap.addEventListener("click", () => {
        state.view = "recap";
        render();
      });

      btnTerlambat.addEventListener("click", () => {
        state.mode = "terlambat";
        render();
      });

      btnRajin.addEventListener("click", () => {
        state.mode = "rajin";
        render();
      });

      monthSelect.addEventListener("change", (event) => {
        state.selectedMonth = event.target.value;
        render();
      });

      btnShare.addEventListener("click", async () => {
        const url = window.location.href;
        try {
          if (navigator.share) {
            await navigator.share({ title: document.title, url });
          } else if (navigator.clipboard) {
            await navigator.clipboard.writeText(url);
            btnShare.innerHTML = `<i class="ph ph-check"></i>`;
            setTimeout(() => {
              btnShare.innerHTML = `<i class="ph ph-share-network"></i>`;
            }, 1200);
          } else {
            prompt("Copy link:", url);
          }
        } catch (error) {
          console.error(error);
        }
      });

      loadData();
    </script>
  </body>
</html>
