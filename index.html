<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Ranking Keterlambatan</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Rubik", sans-serif;
      }

      body {
        min-height: 100vh;
        background: #fbfaff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
      }

      main {
        width: min(760px, 100%);
        background: #ffffff;
        box-shadow: 0px 5px 15px 8px #e4e7fb;
        border-radius: 14px;
        overflow: hidden;
      }

      /* Header */
      #header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px 18px 10px 18px;
      }

      .titleWrap h1 {
        font-size: 18px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: #141a39;
      }

      .titleWrap p {
        margin-top: 6px;
        font-size: 13px;
        color: #4a4f6a;
        line-height: 1.35;
      }

      .share {
        flex: 0 0 auto;
        width: 44px;
        height: 36px;
        background: #f55e77;
        border: 0;
        border-bottom: 3px solid #c0506a;
        border-radius: 999px;
        cursor: pointer;
        display: grid;
        place-items: center;
      }

      .share:active {
        border-bottom: 0;
        transform: translateY(2px);
      }

      .share i {
        color: #fff;
        font-size: 20px;
      }

      /* Filter */
      #filters {
        display: flex;
        gap: 10px;
        padding: 0 18px 12px 18px;
        flex-wrap: wrap;
      }

      .filterBtn {
        border: 1px solid #d7daf6;
        background: #fff;
        color: #141a39;
        padding: 10px 12px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .filterBtn i {
        font-size: 18px;
      }

      .filterBtn.active {
        background: #5c5be5;
        border-color: #5c5be5;
        color: #fff;
      }

      .hint {
        padding: 0 18px 14px 18px;
        font-size: 12.5px;
        color: #5a5f7a;
      }

      /* Leaderboard wrapper */
      #leaderboard {
        padding: 0 0 12px 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        color: #141a39;
      }

      tbody tr {
        transition: background 0.15s ease;
      }

      /* baris genap/ganjil */
      tbody tr:nth-child(odd):not(:first-child) {
        background: #f9f9f9;
      }

      tbody tr:hover:not(:first-child) {
        background: #ffffff;
      }

      td {
        padding: 14px 18px;
        font-size: 14px;
        vertical-align: middle;
      }

      .number {
        width: 56px;
        font-size: 18px;
        font-weight: 700;
        text-align: left;
        color: #141a39;
      }

      .name {
        text-align: left;
        font-weight: 600;
        word-break: break-word;
      }

      .points {
        text-align: right;
        font-weight: 700;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
      }

      .medal {
        width: 28px;
        height: 28px;
        display: inline-grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.32);
        font-size: 16px;
      }

      /* FIX: Baris #1 jadi header bar yang bener (bukan ribbon absolute) */
      tbody tr:first-child {
        background: #5c5be5;
      }

      tbody tr:first-child td {
        color: #fff;
      }

      tbody tr:first-child .number {
        color: #fff;
      }

      /* Biar sudut atas tabel ikut rounded */
      tbody tr:first-child td:first-child {
        border-top-left-radius: 14px;
      }
      tbody tr:first-child td:last-child {
        border-top-right-radius: 14px;
      }

      /* Status */
      #status {
        padding: 14px 18px 10px 18px;
        color: #4a4f6a;
        font-size: 13px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #d7daf6;
        background: #fbfaff;
        padding: 8px 12px;
        border-radius: 999px;
      }

      .pill i {
        font-size: 18px;
      }

      @media (max-width: 520px) {
        td {
          padding: 12px 12px;
          font-size: 13px;
        }
        .number {
          width: 44px;
          font-size: 16px;
        }
        #header {
          padding: 16px 14px 10px 14px;
        }
        #filters,
        .hint,
        #status {
          padding-left: 14px;
          padding-right: 14px;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <div id="header">
        <div class="titleWrap">
          <h1>RANKING</h1>
          <p id="subtitle">Ranking Paling Terlambat</p>
        </div>

        <button class="share" id="btnShare" aria-label="Share">
          <i class="ph ph-share-network"></i>
        </button>
      </div>

      <div id="filters">
        <button class="filterBtn active" id="btnTerlambat" type="button">
          <i class="ph ph-sort-descending"></i>
          Ranking Paling Terlambat
        </button>
        <button class="filterBtn" id="btnRajin" type="button">
          <i class="ph ph-sort-ascending"></i>
          Ranking Paling Rajin
        </button>
      </div>

      <div class="hint">
        <strong>Catatan:</strong> Data Ranking Berubah max 3 menit setelah perubahan data admin.
      </div>

      <div id="leaderboard">
        <table aria-label="Leaderboard">
          <tbody id="tbody"></tbody>
        </table>
        <div id="status"></div>
      </div>
    </main>

    <script>
      const PUBHTML_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2MhRX_p6g3KFPP2W4XJn6g98RbhDdjIPFztK71HafHiZ9WGCLoGZ7pm_X2lPTA-yIizfIxgA2mEVA/pubhtml";

      function pubhtmlToCsv(url) {
        return url.replace(/\/pubhtml(\?.*)?$/, "/pub?output=csv");
      }

      function parseCSV(text) {
        const rows = [];
        let row = [];
        let cur = "";
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          const next = text[i + 1];

          if (ch === '"' && inQuotes && next === '"') {
            cur += '"';
            i++;
            continue;
          }

          if (ch === '"') {
            inQuotes = !inQuotes;
            continue;
          }

          if (!inQuotes && ch === ",") {
            row.push(cur);
            cur = "";
            continue;
          }

          if (!inQuotes && ch === "\n") {
            row.push(cur);
            rows.push(row);
            row = [];
            cur = "";
            continue;
          }

          if (ch !== "\r") cur += ch;
        }

        if (cur.length > 0 || row.length > 0) {
          row.push(cur);
          rows.push(row);
        }

        return rows;
      }

      function normalize(s) {
        return (s ?? "").toString().trim().toLowerCase();
      }

      function medalForRank(rank) {
        if (rank === 1) return "🥇";
        if (rank === 2) return "🥈";
        if (rank === 3) return "🥉";
        return null;
      }

      let employees = [];
      let mode = "terlambat";

      const tbody = document.getElementById("tbody");
      const statusEl = document.getElementById("status");
      const subtitle = document.getElementById("subtitle");

      const btnTerlambat = document.getElementById("btnTerlambat");
      const btnRajin = document.getElementById("btnRajin");
      const btnShare = document.getElementById("btnShare");

      function setMode(newMode) {
        mode = newMode;

        btnTerlambat.classList.toggle("active", mode === "terlambat");
        btnRajin.classList.toggle("active", mode === "rajin");

        subtitle.textContent =
          mode === "terlambat"
            ? "Ranking Paling Terlambat"
            : "Ranking Paling Rajin";

        render();
      }

      function render() {
        tbody.innerHTML = "";

        const sorted = [...employees].sort((a, b) => {
          if (mode === "terlambat") return b.total - a.total;
          return a.total - b.total;
        });

        sorted.forEach((emp, idx) => {
          const rank = idx + 1;
          const medal = medalForRank(rank);

          const tr = document.createElement("tr");

          const tdNum = document.createElement("td");
          tdNum.className = "number";
          tdNum.textContent = rank;

          const tdName = document.createElement("td");
          tdName.className = "name";
          tdName.textContent = emp.name;

          const tdPts = document.createElement("td");
          tdPts.className = "points";
          tdPts.innerHTML = `
            <span>${emp.total}</span>
            ${
              medal
                ? `<span class="medal" title="Top ${rank}">${medal}</span>`
                : ""
            }
          `;

          tr.appendChild(tdNum);
          tr.appendChild(tdName);
          tr.appendChild(tdPts);

          tbody.appendChild(tr);
        });


      }

      async function loadData() {
        try {
          statusEl.innerHTML = `<span class="pill"><i class="ph ph-circle-notch"></i> Memuat data...</span>`;

          const csvUrl = pubhtmlToCsv(PUBHTML_URL);
          const res = await fetch(csvUrl, { cache: "no-store" });
          if (!res.ok) throw new Error("Gagal fetch CSV: " + res.status);

          const text = await res.text();
          const rows = parseCSV(text);

          if (!rows.length) throw new Error("CSV kosong");

          let headerIndex = -1;
          let nameCol = -1;
          let totalCol = -1;

          for (let i = 0; i < Math.min(rows.length, 30); i++) {
            const r = rows[i].map(normalize);
            const nIdx = r.findIndex((x) => x === "nama");
            const tIdx = r.findIndex((x) => x === "total");
            if (nIdx !== -1 && tIdx !== -1) {
              headerIndex = i;
              nameCol = nIdx;
              totalCol = tIdx;
              break;
            }
          }

          if (headerIndex === -1) {
            throw new Error("Header tidak ditemukan. Pastikan ada kolom NAMA dan TOTAL.");
          }

          const dataRows = rows.slice(headerIndex + 1);

          const parsed = [];
          for (const r of dataRows) {
            const name = (r[nameCol] ?? "").trim();
            const totalRaw = (r[totalCol] ?? "").toString().trim();
            if (!name) continue;

            const total = Number(String(totalRaw).replace(/[^\d.-]/g, "")) || 0;
            parsed.push({ name, total });
          }

          const map = new Map();
          for (const item of parsed) {
            const key = item.name.toLowerCase();
            const prev = map.get(key);
            if (!prev) map.set(key, item);
            else map.set(key, prev.total >= item.total ? prev : item);
          }

          employees = Array.from(map.values());

          if (!employees.length) {
            throw new Error("Data tidak ditemukan di kolom NAMA/TOTAL.");
          }

          render();
        } catch (err) {
          console.error(err);
          statusEl.innerHTML = `
            <span class="pill">
              <i class="ph ph-warning-circle"></i>
              Gagal memuat data. Cek link publish-to-web dan pastikan bisa diakses publik.
            </span>
          `;
        }
      }

      btnTerlambat.addEventListener("click", () => setMode("terlambat"));
      btnRajin.addEventListener("click", () => setMode("rajin"));

      btnShare.addEventListener("click", async () => {
        const url = window.location.href;
        try {
          if (navigator.share) {
            await navigator.share({ title: document.title, url });
          } else if (navigator.clipboard) {
            await navigator.clipboard.writeText(url);
            btnShare.innerHTML = `<i class="ph ph-check"></i>`;
            setTimeout(() => {
              btnShare.innerHTML = `<i class="ph ph-share-network"></i>`;
            }, 1200);
          } else {
            prompt("Copy link:", url);
          }
        } catch (e) {}
      });

      loadData();
    </script>
  </body>
</html>
