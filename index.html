<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Ranking & Recap</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Rubik", sans-serif;
      }

      :root {
        --bg: #fbfaff;
        --card: #ffffff;
        --text: #141a39;
        --muted: #4a4f6a;
        --line: #d7daf6;
        --primary: #5c5be5;
        --primary-dark: #4b49cb;
        --soft: #f3f2ff;
        --pink: #f55e77;
        --pink-dark: #c0506a;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
      }

      main {
        width: min(980px, 100%);
        background: var(--card);
        box-shadow: 0 5px 15px 8px #e4e7fb;
        border-radius: 18px;
        overflow: hidden;
      }

      #header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 20px 10px 20px;
      }

      .titleWrap h1 {
        font-size: 18px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--text);
      }

      .titleWrap p {
        margin-top: 6px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.35;
      }

      .share {
        flex: 0 0 auto;
        width: 44px;
        height: 36px;
        background: var(--pink);
        border: 0;
        border-bottom: 3px solid var(--pink-dark);
        border-radius: 999px;
        cursor: pointer;
        display: grid;
        place-items: center;
      }

      .share:active {
        border-bottom: 0;
        transform: translateY(2px);
      }

      .share i {
        color: #fff;
        font-size: 20px;
      }

      .section {
        padding: 0 20px 12px 20px;
      }

      .toolbar,
      .modeRow {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .modeRow {
        margin-top: 10px;
        align-items: stretch;
      }

      .btn {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        padding: 10px 14px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .btn i {
        font-size: 18px;
      }

      .btn.active {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }

      .selectWrap {
        position: relative;
        min-width: 230px;
        flex: 1 1 260px;
      }

      .selectWrap.hidden {
        display: none;
      }

      .selectIcon,
      .selectArrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        color: var(--text);
      }

      .selectIcon {
        left: 14px;
        font-size: 18px;
      }

      .selectArrow {
        right: 14px;
        font-size: 18px;
      }

      select {
        width: 100%;
        height: 100%;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        padding: 10px 42px 10px 40px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 13px;
        outline: none;
        appearance: none;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 10px;
      }

      .statCard {
        border: 1px solid #c8ccf9;
        background: #f4f4ff;
        border-radius: 14px;
        padding: 12px 14px;
      }

      .statCard .label {
        font-size: 12.5px;
        color: #586081;
      }

      .statCard .value {
        margin-top: 6px;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }

      .hint {
        padding: 4px 20px 14px 20px;
        font-size: 12.5px;
        color: #5a5f7a;
      }

      #leaderboard {
        padding: 0 0 16px 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        color: var(--text);
      }

      tbody tr {
        transition: background 0.15s ease;
      }

      tbody tr:nth-child(odd):not(:first-child) {
        background: #f9f9f9;
      }

      tbody tr:hover:not(:first-child) {
        background: #fff;
      }

      td {
        padding: 14px 18px;
        font-size: 14px;
        vertical-align: middle;
      }

      .number {
        width: 72px;
        font-size: 18px;
        font-weight: 700;
        text-align: left;
        color: var(--text);
      }

      .name {
        text-align: left;
        font-weight: 600;
        word-break: break-word;
      }

      .points {
        width: 180px;
        text-align: right;
        font-weight: 700;
      }

      .pointsWrap {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
      }

      .medal {
        width: 28px;
        height: 28px;
        display: inline-grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.32);
        font-size: 16px;
      }

      tbody tr:first-child {
        background: var(--primary);
      }

      tbody tr:first-child td,
      tbody tr:first-child .number {
        color: #fff;
      }

      tbody tr:first-child td:first-child {
        border-top-left-radius: 14px;
      }

      tbody tr:first-child td:last-child {
        border-top-right-radius: 14px;
      }

      #status {
        padding: 14px 20px 0 20px;
        color: var(--muted);
        font-size: 13px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        background: var(--bg);
        padding: 8px 12px;
        border-radius: 999px;
      }

      .pill i {
        font-size: 18px;
      }

      .mutedText {
        color: var(--muted);
      }

      .spin {
        display: inline-block;
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 760px) {
        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        main {
          border-radius: 14px;
        }

        #header {
          padding: 16px 14px 10px 14px;
        }

        .section,
        .hint,
        #status {
          padding-left: 14px;
          padding-right: 14px;
        }

        td {
          padding: 12px;
          font-size: 13px;
        }

        .number {
          width: 52px;
          font-size: 16px;
        }

        .points {
          width: 110px;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <div id="header">
        <div class="titleWrap">
          <h1 id="pageTitle">RANKING</h1>
          <p id="subtitle">Ranking Paling Terlambat</p>
        </div>

        <button class="share" id="btnShare" aria-label="Share">
          <i class="ph ph-share-network"></i>
        </button>
      </div>

      <div class="section">
        <div class="toolbar">
          <button class="btn active" id="btnViewRanking" type="button">
            <i class="ph ph-trophy"></i>
            Ranking
          </button>
          <button class="btn" id="btnViewRecap" type="button">
            <i class="ph ph-chart-bar"></i>
            Recap
          </button>
        </div>

        <div class="modeRow">
          <button class="btn active" id="btnTerlambat" type="button">
            <i class="ph ph-sort-descending"></i>
            Ranking Paling Terlambat
          </button>
          <button class="btn" id="btnRajin" type="button">
            <i class="ph ph-sort-ascending"></i>
            Ranking Paling Rajin
          </button>

          <div class="selectWrap hidden" id="monthWrap">
            <i class="ph ph-calendar selectIcon"></i>
            <select id="monthSelect" aria-label="Filter Bulan">
              <option value="total">1 Tahun</option>
            </select>
            <i class="ph ph-caret-down selectArrow"></i>
          </div>
        </div>

        <div class="stats">
          <div class="statCard">
            <div class="label">Tampilan</div>
            <div class="value" id="statView">Ranking</div>
          </div>
          <div class="statCard">
            <div class="label">Filter</div>
            <div class="value" id="statFilter">Total</div>
          </div>
          <div class="statCard">
            <div class="label">Total User</div>
            <div class="value" id="statUsers">0</div>
          </div>
          <div class="statCard">
            <div class="label">Total Nilai</div>
            <div class="value" id="statTotal">0</div>
          </div>
        </div>
      </div>

      <div class="hint" id="hintText">
        <strong>Catatan:</strong> Data ranking berubah maksimal 3 menit setelah perubahan data admin.
      </div>

      <div id="leaderboard">
        <table aria-label="Leaderboard">
          <tbody id="tbody"></tbody>
        </table>
        <div id="status"></div>
      </div>
    </main>

    <script>
      const RANKING_PUBHTML_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2MhRX_p6g3KFPP2W4XJn6g98RbhDdjIPFztK71HafHiZ9WGCLoGZ7pm_X2lPTA-yIizfIxgA2mEVA/pubhtml";

      const RECAP_PUBHTML_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2MhRX_p6g3KFPP2W4XJn6g98RbhDdjIPFztK71HafHiZ9WGCLoGZ7pm_X2lPTA-yIizfIxgA2mEVA/pubhtml?gid=949865330&single=true";
      const RECAP_CSV_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2MhRX_p6g3KFPP2W4XJn6g98RbhDdjIPFztK71HafHiZ9WGCLoGZ7pm_X2lPTA-yIizfIxgA2mEVA/pub?gid=949865330&output=csv";
      const RECAP_TSV_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2MhRX_p6g3KFPP2W4XJn6g98RbhDdjIPFztK71HafHiZ9WGCLoGZ7pm_X2lPTA-yIizfIxgA2mEVA/pub?gid=949865330&output=tsv";
      const RECAP_CSV_URL_ALT =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2MhRX_p6g3KFPP2W4XJn6g98RbhDdjIPFztK71HafHiZ9WGCLoGZ7pm_X2lPTA-yIizfIxgA2mEVA/pub?gid=949865330&single=true&output=csv";
      const RECAP_TSV_URL_ALT =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2MhRX_p6g3KFPP2W4XJn6g98RbhDdjIPFztK71HafHiZ9WGCLoGZ7pm_X2lPTA-yIizfIxgA2mEVA/pub?gid=949865330&single=true&output=tsv";

      const RECAP_EDIT_URL =
        "https://docs.google.com/spreadsheets/d/1AdX5f32ruU_hGMxELgn4iQK-Y8AI-jnXBi443_bNE4Q/edit?gid=949865330#gid=949865330";
      const RECAP_DIRECT_TSV_URL =
        "https://doc-00-90-sheets.googleusercontent.com/pub/54bogvaave6cua4cdnls17ksc4/hcpd18csd0cgo1rq14k9f1hf84/1775447900000/114373693213533810548/*/e@2PACX-1vT2MhRX_p6g3KFPP2W4XJn6g98RbhDdjIPFztK71HafHiZ9WGCLoGZ7pm_X2lPTA-yIizfIxgA2mEVA?gid=949865330&output=tsv";

      const MONTHS = [
        { key: "januari", label: "Januari", aliases: ["januari", "jan"] },
        { key: "februari", label: "Februari", aliases: ["februari", "feb"] },
        { key: "maret", label: "Maret", aliases: ["maret", "mar"] },
        { key: "april", label: "April", aliases: ["april", "apr"] },
        { key: "mei", label: "Mei", aliases: ["mei", "may"] },
        { key: "juni", label: "Juni", aliases: ["juni", "jun"] },
        { key: "juli", label: "Juli", aliases: ["juli", "jul"] },
        { key: "agustus", label: "Agustus", aliases: ["agustus", "agu", "agt", "aug"] },
        { key: "september", label: "September", aliases: ["september", "sep", "sept"] },
        { key: "oktober", label: "Oktober", aliases: ["oktober", "okt", "oct"] },
        { key: "november", label: "November", aliases: ["november", "nov"] },
        { key: "desember", label: "Desember", aliases: ["desember", "des", "dec"] },
      ];

      const state = {
        view: "ranking",
        mode: "terlambat",
        selectedMonth: "total",
        rankingRows: [],
        recapRows: [],
        recapMonths: [],
        rankingLoaded: false,
        recapLoaded: false,
        rankingError: "",
        recapError: "",
        rankingLoading: false,
        recapLoading: false,
        rankingSourceLabel: "sheet ranking",
        recapSourceLabel: "sheet recap",
        loadedAt: null,
      };

      const tbody = document.getElementById("tbody");
      const statusEl = document.getElementById("status");
      const pageTitle = document.getElementById("pageTitle");
      const subtitle = document.getElementById("subtitle");
      const hintText = document.getElementById("hintText");

      const btnViewRanking = document.getElementById("btnViewRanking");
      const btnViewRecap = document.getElementById("btnViewRecap");
      const btnTerlambat = document.getElementById("btnTerlambat");
      const btnRajin = document.getElementById("btnRajin");
      const btnShare = document.getElementById("btnShare");
      const monthWrap = document.getElementById("monthWrap");
      const monthSelect = document.getElementById("monthSelect");

      const statView = document.getElementById("statView");
      const statFilter = document.getElementById("statFilter");
      const statUsers = document.getElementById("statUsers");
      const statTotal = document.getElementById("statTotal");

      function normalize(value) {
        return (value ?? "").toString().trim().toLowerCase();
      }

      function cleanCell(value) {
        return (value ?? "").toString().replace(/\u00a0/g, " ").trim();
      }

      function parseNumber(value) {
        const cleaned = String(value ?? "")
          .replace(/\./g, "")
          .replace(/,/g, ".")
          .replace(/[^\d.-]/g, "")
          .trim();

        const number = Number(cleaned);
        return Number.isFinite(number) ? number : 0;
      }

      function formatNumber(value) {
        return new Intl.NumberFormat("id-ID").format(Number(value || 0));
      }

      function medalForRank(rank) {
        if (rank === 1) return "🥇";
        if (rank === 2) return "🥈";
        if (rank === 3) return "🥉";
        return null;
      }

      function pubhtmlToCsv(url, options = {}) {
        try {
          const parsed = new URL(url, window.location.href);
          parsed.pathname = parsed.pathname.replace(/\/pubhtml$/i, "/pub");
          parsed.searchParams.set("output", options.output || "csv");
          if (options.dropSingle) parsed.searchParams.delete("single");
          return parsed.toString();
        } catch (error) {
          return url.replace(/\/pubhtml(\?.*)?$/i, "/pub?output=csv");
        }
      }

      function parseDelimited(text, delimiter = ",") {
        const rows = [];
        let row = [];
        let current = "";
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          const next = text[i + 1];

          if (delimiter === "," && char === '"' && inQuotes && next === '"') {
            current += '"';
            i += 1;
            continue;
          }

          if (delimiter === "," && char === '"') {
            inQuotes = !inQuotes;
            continue;
          }

          if (!inQuotes && char === delimiter) {
            row.push(current);
            current = "";
            continue;
          }

          if (!inQuotes && char === "\n") {
            row.push(current);
            rows.push(row);
            row = [];
            current = "";
            continue;
          }

          if (char !== "\r") current += char;
        }

        if (current.length > 0 || row.length > 0) {
          row.push(current);
          rows.push(row);
        }

        return rows.map((item) => item.map(cleanCell));
      }

      function parseHtmlTable(text) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/html");
        const rows = [];

        doc.querySelectorAll("table").forEach((table) => {
          table.querySelectorAll("tr").forEach((tr) => {
            const cells = Array.from(tr.querySelectorAll("th, td")).map((cell) =>
              cleanCell(cell.textContent)
            );
            if (cells.some((cell) => cell !== "")) rows.push(cells);
          });
        });

        return rows;
      }

      function parseSheetText(text) {
        const trimmed = String(text || "").trim();
        if (!trimmed) return [];

        if (/<html|<!doctype html|<table/i.test(trimmed)) {
          return parseHtmlTable(trimmed);
        }

        const sample = trimmed.split("\n").slice(0, 5).join("\n");
        const commaCount = (sample.match(/,/g) || []).length;
        const tabCount = (sample.match(/\t/g) || []).length;
        return parseDelimited(trimmed, tabCount > commaCount ? "\t" : ",");
      }

      function getSheetCandidates(url, options = {}) {
        const candidates = [];
        const push = (target, label) => {
          if (!target) return;
          if (candidates.some((item) => item.url === target)) return;
          candidates.push({ url: target, label });
        };

        push(url, options.baseLabel || "Sheet");

        try {
          const parsed = new URL(url, window.location.href);
          const gid = parsed.searchParams.get("gid") || options.gid || "";
          const isPublished = /\/spreadsheets\/d\/e\//i.test(parsed.pathname);
          const idMatch = parsed.pathname.match(/\/spreadsheets\/d\/([^/]+)/i);
          const sheetId = idMatch ? idMatch[1] : "";

          if (/\/pubhtml$/i.test(parsed.pathname)) {
            push(pubhtmlToCsv(parsed.toString(), { output: "csv" }), `${options.baseLabel || "Sheet"} CSV`);
            push(pubhtmlToCsv(parsed.toString(), { output: "csv", dropSingle: true }), `${options.baseLabel || "Sheet"} CSV alt`);
            push(pubhtmlToCsv(parsed.toString(), { output: "tsv" }), `${options.baseLabel || "Sheet"} TSV`);
            push(pubhtmlToCsv(parsed.toString(), { output: "tsv", dropSingle: true }), `${options.baseLabel || "Sheet"} TSV alt`);
          }

          if (!isPublished && sheetId) {
            const exportBase = `https://docs.google.com/spreadsheets/d/${sheetId}/export`;
            if (gid) {
              push(`${exportBase}?format=csv&gid=${encodeURIComponent(gid)}`, `${options.baseLabel || "Sheet"} export CSV`);
              push(`${exportBase}?format=tsv&gid=${encodeURIComponent(gid)}`, `${options.baseLabel || "Sheet"} export TSV`);
              push(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${encodeURIComponent(gid)}`, `${options.baseLabel || "Sheet"} gviz CSV`);
            }
          }
        } catch (error) {
          console.error(error);
        }

        return candidates;
      }

      async function fetchSheetRows(urls, options = {}) {
        const list = Array.isArray(urls) ? urls : [urls];
        const candidates = [];
        list.forEach((item) => {
          getSheetCandidates(item, options).forEach((candidate) => {
            if (!candidates.some((existing) => existing.url === candidate.url)) {
              candidates.push(candidate);
            }
          });
        });

        let lastError = null;

        for (const candidate of candidates) {
          try {
            const response = await fetch(candidate.url, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            const rows = parseSheetText(text).filter((row) => row.some((cell) => cleanCell(cell) !== ""));
            if (rows.length) {
              return {
                rows,
                sourceLabel: candidate.label,
                sourceUrl: candidate.url,
              };
            }
            lastError = new Error(`Sheet kosong dari ${candidate.label}`);
          } catch (error) {
            lastError = error;
          }
        }

        throw lastError || new Error("Gagal membaca sheet.");
      }

      async function fetchSheetRowsValidated(urls, options = {}) {
        const list = Array.isArray(urls) ? urls : [urls];
        const candidates = [];
        list.forEach((item) => {
          getSheetCandidates(item, options).forEach((candidate) => {
            if (!candidates.some((existing) => existing.url === candidate.url)) {
              candidates.push(candidate);
            }
          });
        });

        let lastError = null;
        let foundWrongSheet = false;

        for (const candidate of candidates) {
          try {
            const response = await fetch(candidate.url, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const text = await response.text();
            const rows = parseSheetText(text).filter((row) => row.some((cell) => cleanCell(cell) !== ""));
            if (!rows.length) {
              lastError = new Error(`Sheet kosong dari ${candidate.label}`);
              continue;
            }

            const recapInfo = findRecapColumns(rows);
            if (recapInfo) {
              return {
                rows,
                info: recapInfo,
                sourceLabel: candidate.label,
                sourceUrl: candidate.url,
              };
            }

            if (findRankingColumns(rows)) {
              foundWrongSheet = true;
              lastError = new Error(`URL ${candidate.label} masih mengarah ke sheet ranking/default`);
              continue;
            }

            lastError = new Error(`Header recap tidak ditemukan pada ${candidate.label}`);
          } catch (error) {
            lastError = error;
          }
        }

        if (foundWrongSheet) {
          throw new Error("Link recap yang pertama masih masuk ke sheet default. Saya lanjut coba URL lain, tapi semuanya belum memberi format RECAP yang valid.");
        }

        throw lastError || new Error("Gagal membaca sheet recap.");
      }

      function monthMeta(cell) {
        const key = normalize(cell);
        return MONTHS.find((month) => month.aliases.includes(key));
      }

      function findRankingColumns(rows) {
        for (let i = 0; i < Math.min(rows.length, 30); i++) {
          const normalized = rows[i].map(normalize);
          const nameCol = normalized.findIndex((x) => x === "nama");
          const totalCol = normalized.findIndex((x) => x === "total");
          if (nameCol !== -1 && totalCol !== -1) {
            return { headerIndex: i, nameCol, totalCol };
          }
        }
        return null;
      }

      function findRecapColumns(rows) {
        let best = null;

        for (let i = 0; i < Math.min(rows.length, 50); i++) {
          const headerA = rows[i] || [];
          const headerB = rows[i + 1] || [];
          const normalizedA = headerA.map(normalize);
          const normalizedB = headerB.map(normalize);
          const maxLen = Math.max(headerA.length, headerB.length);

          const rowANameCol = normalizedA.findIndex((x) => x === "nama");
          const rowBNameCol = normalizedB.findIndex((x) => x === "nama");
          const nameCol = rowANameCol !== -1 ? rowANameCol : rowBNameCol;
          if (nameCol === -1) continue;

          const rowATotalCol = normalizedA.findIndex((x) => x === "total");
          const rowBTotalCol = normalizedB.findIndex((x) => x === "total");
          const totalCol = rowATotalCol !== -1 ? rowATotalCol : rowBTotalCol;

          const monthCols = [];
          let fromRowA = 0;
          let fromRowB = 0;

          for (let index = 0; index < maxLen; index++) {
            const metaA = monthMeta(headerA[index]);
            const metaB = monthMeta(headerB[index]);
            const meta = metaA || metaB;
            if (!meta) continue;
            if (monthCols.some((item) => item.key === meta.key)) continue;
            monthCols.push({ ...meta, index });
            if (metaA) fromRowA += 1;
            if (!metaA && metaB) fromRowB += 1;
          }

          const usesSecondHeaderRow =
            monthCols.length > 0 &&
            fromRowB >= fromRowA &&
            rowANameCol !== -1 &&
            (rowATotalCol !== -1 || normalize(headerA[nameCol]) === "nama");

          const dataStartIndex = i + (usesSecondHeaderRow ? 2 : 1);
          const score =
            monthCols.length * 100 +
            (totalCol !== -1 ? 20 : 0) +
            (usesSecondHeaderRow ? 15 : 0) +
            (monthCols.length >= 12 ? 50 : 0);

          if ((monthCols.length >= 3 || (monthCols.length >= 1 && totalCol !== -1)) && (!best || score > best.score)) {
            best = {
              score,
              headerIndex: i,
              dataStartIndex,
              nameCol,
              totalCol,
              monthCols,
              usesSecondHeaderRow,
              lastMonthIndex: monthCols.reduce((max, item) => Math.max(max, item.index), -1),
            };
          }
        }

        return best;
      }

      function renderMonthOptions() {
        monthSelect.innerHTML = "";

        const totalOption = document.createElement("option");
        totalOption.value = "total";
        totalOption.textContent = "1 Tahun";
        monthSelect.appendChild(totalOption);

        state.recapMonths.forEach((month) => {
          const option = document.createElement("option");
          option.value = month.key;
          option.textContent = month.label;
          monthSelect.appendChild(option);
        });

        if (!monthSelect.querySelector(`option[value="${state.selectedMonth}"]`)) {
          state.selectedMonth = "total";
        }
        monthSelect.value = state.selectedMonth;
      }

      function getCurrentRows() {
        return state.view === "ranking" ? state.rankingRows : state.recapRows;
      }

      function getCurrentValue(row) {
        if (state.view === "recap") {
          if (state.selectedMonth === "total") return row.total || 0;
          return row.months?.[state.selectedMonth] || 0;
        }
        return row.total || 0;
      }

      function getCurrentFilterLabel() {
        if (state.view === "ranking") return "Total";
        if (state.selectedMonth === "total") return "1 Tahun";
        const found = state.recapMonths.find((item) => item.key === state.selectedMonth);
        return found ? found.label : "1 Tahun";
      }

      function updateHeaderTexts() {
        const filterLabel = getCurrentFilterLabel();

        pageTitle.textContent = state.view === "ranking" ? "RANKING" : "RECAP";

        if (state.view === "ranking") {
          subtitle.textContent =
            state.mode === "terlambat"
              ? "Ranking Paling Terlambat"
              : "Ranking Paling Rajin";
          hintText.innerHTML =
            "<strong>Catatan:</strong> Data ranking berubah maksimal 3 menit setelah perubahan data admin.";
        } else {
          subtitle.textContent =
            state.mode === "terlambat"
              ? `Ranking Recap Terbanyak - ${filterLabel}`
              : `Ranking Recap Terkecil - ${filterLabel}`;
          hintText.innerHTML =
            "<strong>Catatan:</strong> Tombol recap mengambil data dari sheet recap dan bisa difilter per bulan atau 1 tahun.";
        }
      }

      function updateButtons() {
        btnViewRanking.classList.toggle("active", state.view === "ranking");
        btnViewRecap.classList.toggle("active", state.view === "recap");
        btnTerlambat.classList.toggle("active", state.mode === "terlambat");
        btnRajin.classList.toggle("active", state.mode === "rajin");
        monthWrap.classList.toggle("hidden", state.view !== "recap");
      }

      function updateStats(rows) {
        const values = rows.map((row) => getCurrentValue(row));
        const totalNilai = values.reduce((sum, value) => sum + value, 0);

        statView.textContent = state.view === "ranking" ? "Ranking" : "Recap";
        statFilter.textContent = getCurrentFilterLabel();
        statUsers.textContent = formatNumber(rows.length);
        statTotal.textContent = formatNumber(totalNilai);
      }

      function updateStatus(rows) {
        const currentError = state.view === "ranking" ? state.rankingError : state.recapError;
        const currentLoading = state.view === "ranking" ? state.rankingLoading : state.recapLoading;
        const sourceName = state.view === "ranking" ? state.rankingSourceLabel : state.recapSourceLabel;

        if (currentLoading) {
          statusEl.innerHTML =
            '<span class="pill"><i class="ph ph-circle-notch spin"></i> Memuat data...</span>';
          return;
        }

        if (currentError) {
          statusEl.innerHTML =
            `<span class="pill"><i class="ph ph-warning-circle"></i> ${currentError}</span>`;
          return;
        }

        const timeLabel = state.loadedAt
          ? new Date(state.loadedAt).toLocaleTimeString("id-ID", {
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit",
            })
          : "-";

        statusEl.innerHTML =
          `<span class="pill"><i class="ph ph-database"></i> Sumber: ${sourceName} | Filter: ${getCurrentFilterLabel()} | Data user: ${rows.length} | Update tampilan: ${timeLabel}</span>`;
      }

      function renderTable() {
        updateButtons();
        updateHeaderTexts();

        const sourceRows = getCurrentRows();
        const sorted = [...sourceRows].sort((a, b) => {
          const valueA = getCurrentValue(a);
          const valueB = getCurrentValue(b);

          if (state.mode === "terlambat") {
            if (valueB !== valueA) return valueB - valueA;
          } else {
            if (valueA !== valueB) return valueA - valueB;
          }

          return (a.name || "").localeCompare(b.name || "", "id");
        });

        tbody.innerHTML = "";

        const headerRow = document.createElement("tr");
        headerRow.innerHTML = `
          <td class="number">RANK</td>
          <td class="name">NAMA</td>
          <td class="points">${getCurrentFilterLabel().toUpperCase()}</td>
        `;
        tbody.appendChild(headerRow);

        if (!sorted.length) {
          const emptyRow = document.createElement("tr");
          emptyRow.innerHTML =
            '<td colspan="3" class="mutedText">Belum ada data yang bisa ditampilkan.</td>';
          tbody.appendChild(emptyRow);
          updateStats([]);
          updateStatus([]);
          return;
        }

        sorted.forEach((row, index) => {
          const rank = index + 1;
          const medal = medalForRank(rank);
          const value = getCurrentValue(row);

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="number">${rank}</td>
            <td class="name">${row.name}</td>
            <td class="points">
              <div class="pointsWrap">
                <span>${formatNumber(value)}</span>
                ${medal ? `<span class="medal" title="Top ${rank}">${medal}</span>` : ""}
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        });

        updateStats(sorted);
        updateStatus(sorted);
      }

      async function loadRankingData() {
        state.rankingLoading = true;
        state.rankingError = "";
        renderTable();

        try {
          const result = await fetchSheetRows(RANKING_PUBHTML_URL, { baseLabel: "sheet ranking" });
          const rows = result.rows;
          const info = findRankingColumns(rows);
          if (!info) {
            throw new Error("Header ranking tidak ditemukan. Pastikan ada kolom NAMA dan TOTAL.");
          }

          const bestMap = new Map();

          rows.slice(info.dataStartIndex || info.headerIndex + 1).forEach((row) => {
            const name = cleanCell(row[info.nameCol]);
            if (!name) return;

            const total = parseNumber(row[info.totalCol]);
            const key = normalize(name);
            const current = bestMap.get(key);
            if (!current || total > current.total) {
              bestMap.set(key, { name, total });
            }
          });

          state.rankingRows = Array.from(bestMap.values());
          state.rankingLoaded = true;
          state.rankingSourceLabel = result.sourceLabel || "sheet ranking";
          state.loadedAt = Date.now();
        } catch (error) {
          console.error(error);
          state.rankingRows = [];
          state.rankingError = "Gagal memuat data ranking. Cek publish-to-web pada sheet ranking.";
          state.rankingSourceLabel = "sheet ranking";
        } finally {
          state.rankingLoading = false;
          renderTable();
        }
      }

      async function loadRecapData(forceReload = false) {
        if (state.recapLoading) return;
        if (state.recapLoaded && !forceReload) {
          renderTable();
          return;
        }

        state.recapLoading = true;
        state.recapError = "";
        renderTable();

        try {
          const result = await fetchSheetRowsValidated(
            [
              RECAP_DIRECT_TSV_URL,
              RECAP_TSV_URL,
              RECAP_TSV_URL_ALT,
              RECAP_CSV_URL,
              RECAP_CSV_URL_ALT,
              RECAP_EDIT_URL,
              RECAP_PUBHTML_URL,
            ],
            {
              baseLabel: "sheet recap",
              gid: "949865330",
            }
          );

          const rows = result.rows;
          const info = result.info;

          state.recapMonths = info.monthCols.map((item) => ({ key: item.key, label: item.label }));
          renderMonthOptions();

          const map = new Map();

          rows.slice(info.dataStartIndex || info.headerIndex + 1).forEach((row) => {
            const name = cleanCell(row[info.nameCol]);
            if (!name) return;

            const monthValues = {};
            let sumMonths = 0;

            info.monthCols.forEach((month) => {
              const value = parseNumber(row[month.index]);
              monthValues[month.key] = value;
              sumMonths += value;
            });

            let total = sumMonths;
            if (info.totalCol !== -1 && info.totalCol > (info.lastMonthIndex ?? -1)) {
              total = parseNumber(row[info.totalCol]);
            } else if ((info.lastMonthIndex ?? -1) + 1 < row.length) {
              const trailingCells = row.slice((info.lastMonthIndex ?? -1) + 1).map(parseNumber).filter((value) => value || value === 0);
              if (trailingCells.length) total = trailingCells[trailingCells.length - 1];
            }
            const key = normalize(name);

            if (!map.has(key)) {
              map.set(key, {
                name,
                total,
                months: monthValues,
              });
              return;
            }

            const existing = map.get(key);
            existing.total += total;
            info.monthCols.forEach((month) => {
              existing.months[month.key] =
                (existing.months[month.key] || 0) + (monthValues[month.key] || 0);
            });
          });

          state.recapRows = Array.from(map.values()).filter((item) => item.name);
          state.recapLoaded = true;
          state.recapSourceLabel = result.sourceLabel || "sheet recap";
          state.loadedAt = Date.now();
        } catch (error) {
          console.error(error);
          state.recapRows = [];
          state.recapMonths = [];
          renderMonthOptions();
          state.recapError = error?.message && /publish|dipublish|sheet lain|Header recap|sheet default|RECAP|format/i.test(error.message)
            ? error.message
            : "Gagal memuat data recap. Pastikan link TSV/CSV RECAP aktif dan bisa diakses publik.";
          state.recapSourceLabel = "sheet recap";
        } finally {
          state.recapLoading = false;
          renderTable();
        }
      }

      function setMode(mode) {
        state.mode = mode;
        renderTable();
      }

      function setView(view) {
        state.view = view;
        renderTable();

        if (view === "recap") {
          loadRecapData(Boolean(state.recapError));
        }
      }

      btnViewRanking.addEventListener("click", () => setView("ranking"));
      btnViewRecap.addEventListener("click", () => setView("recap"));
      btnTerlambat.addEventListener("click", () => setMode("terlambat"));
      btnRajin.addEventListener("click", () => setMode("rajin"));

      monthSelect.addEventListener("change", (event) => {
        state.selectedMonth = event.target.value || "total";
        renderTable();
      });

      btnShare.addEventListener("click", async () => {
        const url = window.location.href;
        try {
          if (navigator.share) {
            await navigator.share({ title: document.title, url });
          } else if (navigator.clipboard) {
            await navigator.clipboard.writeText(url);
            btnShare.innerHTML = '<i class="ph ph-check"></i>';
            setTimeout(() => {
              btnShare.innerHTML = '<i class="ph ph-share-network"></i>';
            }, 1200);
          } else {
            prompt("Copy link:", url);
          }
        } catch (error) {
          console.error(error);
        }
      });

      renderTable();
      loadRankingData();
    </script>
  </body>
</html>
